databases:
  - name: stratos-db
    databaseName: stratos
    user: stratos_user
    plan: free

services:
  - type: web
    name: stratos-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/docs
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: false
      - key: DB_USER
        fromDatabase:
          name: stratos-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: stratos-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: stratos-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: stratos-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: stratos-db
          property: database
      - key: REDIS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: UPLOAD_DIR
        value: ./uploads
      - key: OUTPUT_DIR
        value: ./outputs

  - type: worker
    name: stratos-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health/queue
    envVars:
      - key: WORKER_HEALTH_PORT
        value: 8001
      - key: RQ_WORKER
        value: true
      - key: AUTO_RESTART_WORKER
        value: true
      - key: ENV
        value: production
      - key: DB_USER
        fromDatabase:
          name: stratos-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: stratos-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: stratos-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: stratos-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: stratos-db
          property: database
      - key: REDIS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: UPLOAD_DIR
        value: ./uploads
      - key: OUTPUT_DIR
        value: ./outputs

  - type: web
    name: stratos-frontend
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    plan: free
    rootDir: ./stratos-data-hub
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://stratos-api.onrender.com
